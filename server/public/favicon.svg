<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <!-- Golden radial glow behind the cap -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#f0a500" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#f0a500" stop-opacity="0"/>
    </radialGradient>
    <!-- Main golden gradient for cap body -->
    <linearGradient id="capGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#ffd166"/>
      <stop offset="50%" stop-color="#f0a500"/>
      <stop offset="100%" stop-color="#c8790a"/>
    </linearGradient>
    <!-- Highlight shine on top board -->
    <linearGradient id="boardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#ffe48a"/>
      <stop offset="100%" stop-color="#e09000"/>
    </linearGradient>
    <!-- Tassel cord gradient -->
    <linearGradient id="tasselGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#ffd166"/>
      <stop offset="100%" stop-color="#b86c00"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Ambient glow circle (transparent bg) -->
  <circle cx="32" cy="32" r="30" fill="url(#glow)"/>

  <!-- CAP BODY (mortarboard base) — the dome/cap part -->
  <path
    d="M32 28 C22 28 14 31 14 35 C14 39 22 42 32 42 C42 42 50 39 50 35 C50 31 42 28 32 28 Z"
    fill="url(#capGrad)"
    filter="url(#softGlow)"
    opacity="0.96"
  />
  <!-- Highlight on cap body -->
  <ellipse cx="32" cy="33" rx="11" ry="3" fill="#ffe48a" opacity="0.25"/>

  <!-- TOP BOARD (mortarboard square) -->
  <polygon
    points="32,12  12,22  32,32  52,22"
    fill="url(#boardGrad)"
    filter="url(#softGlow)"
    opacity="0.97"
  />
  <!-- Board top highlight shine -->
  <polygon
    points="32,12  12,22  22,27  42,17"
    fill="#fff7cc"
    opacity="0.22"
  />
  <!-- Board bottom shadow edge -->
  <polygon
    points="32,32  12,22  22,27  42,27"
    fill="#9d6200"
    opacity="0.18"
  />

  <!-- CENTER BUTTON (top of board) -->
  <circle cx="32" cy="20" r="2.5" fill="#ffd166" opacity="0.85"/>
  <circle cx="32" cy="20" r="1.2" fill="#fff7cc" opacity="0.5"/>

  <!-- TASSEL LINE from center button, going right-down -->
  <line x1="34" y1="20" x2="46" y2="26" stroke="url(#tasselGrad)" stroke-width="1.4" stroke-linecap="round"/>

  <!-- TASSEL KNOT -->
  <circle cx="46" cy="26" r="2" fill="#ffd166" opacity="0.9"/>

  <!-- TASSEL STRANDS (hanging) -->
  <line x1="44" y1="28" x2="42" y2="38" stroke="#f0a500" stroke-width="1.2" stroke-linecap="round" opacity="0.85"/>
  <line x1="46" y1="28" x2="46" y2="39" stroke="#ffd166" stroke-width="1.2" stroke-linecap="round" opacity="0.85"/>
  <line x1="48" y1="28" x2="50" y2="38" stroke="#c8790a" stroke-width="1.2" stroke-linecap="round" opacity="0.85"/>

  <!-- Tassel tip accent lines (crosshatch) -->
  <line x1="42" y1="37" x2="50" y2="37" stroke="#f0a500" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <line x1="41" y1="39" x2="51" y2="39" stroke="#f0a500" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
</svg>
